<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup Companion</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>⚽ World Cup Companion</h1>
      <p>Ask about any World Cup 2026 match — real scores, straight from the tournament.</p>
    </header>

    <div id="chat" class="chat"></div>

    <form id="chat-form" class="chat-form">
      <input
        id="chat-input"
        type="text"
        placeholder="e.g. What's the score of Brazil vs Morocco?"
        autocomplete="off"
      />
      <button type="submit">Ask</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
